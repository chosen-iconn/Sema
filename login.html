<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Secure Access | SEMA Emotional Wellness</title>

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="assets/js/app.js" defer></script>
    <link href="assets/style.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4',
                            400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e',
                            800: '#115e59', 900: '#134e4a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        body { background-color: #f1f5f9; }
        .glass-panel { background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.5); }
        .smooth-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>

<body class="flex flex-col min-h-screen">

    <!-- Header (Dynamically Loaded) -->
    <div id="header" class="relative z-50"></div>

    <main class="flex-grow flex items-center justify-center p-4">
        
        <!-- LOGIN CARD -->
        <div class="glass-panel w-full max-w-md p-10 rounded-3xl shadow-2xl border border-white/50">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-black text-slate-900 mb-2">Welcome Back</h1>
                <p class="text-slate-500 text-sm">Secure access to your SEMA portal.</p>
            </div>

            <form class="space-y-6">
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Username or Email</label>
                    <input type="text" class="w-full bg-white/50 border border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-brand-500 outline-none smooth-transition" placeholder="Enter your email">
                </div>
                
                <div>
                    <label class="block text-xs font-bold uppercase text-slate-500 mb-2">Password</label>
                    <input type="password" class="w-full bg-white/50 border border-slate-200 rounded-xl p-4 focus:ring-2 focus:ring-brand-500 outline-none smooth-transition" placeholder="••••••••">
                </div>

                <div class="flex items-center justify-between text-xs">
                    <label class="flex items-center gap-2 text-slate-600 font-medium">
                        <input type="checkbox" class="rounded text-brand-600 focus:ring-brand-500"> Remember me
                    </label>
                    <a href="#" class="text-brand-600 font-bold hover:underline">Forgot password?</a>
                </div>

                <button type="submit" class="w-full bg-brand-600 text-white font-bold py-4 rounded-xl shadow-lg hover:bg-brand-700 hover:shadow-brand-500/20 smooth-transition">
                    Sign In
                </button>
            </form>

            <div class="mt-8 text-center text-xs text-slate-500">
                Don't have an account? <a href="support.html" class="text-brand-600 font-bold hover:underline">Request access here</a>
            </div>
        </div>

    </main>

    <!-- Footer (Dynamically Loaded) -->
    <div id="footer"></div>

    <script>
        async function loadComponent(id, file) {
            try {
                const response = await fetch(file);
                if(response.ok) { document.getElementById(id).innerHTML = await response.text(); }
            } catch (e) { console.error(`Error loading ${file}`); }
        }
        loadComponent("header", "header.html");
        loadComponent("footer", "footer.html");
    </script>
</body>
</html>
