<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Support | SEMA Emotional Wellness Institution</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { fontFamily: { sans: ['"Plus Jakarta Sans"', 'sans-serif'] }, colors: { brand: { 50: '#f0fdfa', 100: '#ccfbf1', 200: '#99f6e4', 300: '#5eead4', 400: '#2dd4bf', 500: '#14b8a6', 600: '#0d9488', 700: '#0f766e', 800: '#115e59', 900: '#134e4a' } }, boxShadow: { 'soft': '0 4px 20px -2px rgba(0, 0, 0, 0.05)', 'card': '0 10px 30px -5px rgba(20, 184, 166, 0.08)' } } } }
    </script>
    <style>
        body { background-color: #f8fafc; color: #334155; }
    </style>
</head>
<body class="flex flex-col min-h-screen">
    <!-- Header -->
    <div class="bg-brand-900 text-brand-50 py-2 px-4 text-xs font-medium border-b border-brand-800">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <span class="font-bold text-red-300">24/7 CRISIS HELPLINE: 988</span>
        </div>
    </div>
    <header class="bg-white/95 backdrop-blur-md sticky top-0 z-50 border-b border-slate-200 shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <a href="index.html"><img src="https://sema-learn.mutavatosh.workers.dev/assets/sema-logo-BGg-cRRb.png" alt="SEMA Logo" class="h-12 w-auto"></a>
            <nav class="hidden lg:flex items-center space-x-8 font-semibold text-sm text-slate-700">
                <a href="about.html" class="hover:text-brand-600">About Us</a>
                <a href="support.html" class="text-brand-600">Contact Support</a>
            </nav>
        </div>
    </header>

    <main class="flex-grow py-20 max-w-7xl mx-auto px-4 w-full">
        <div class="grid lg:grid-cols-2 gap-16">
            <div class="bg-white p-10 rounded-2xl shadow-soft border border-slate-100">
                <h1 class="text-4xl font-bold mb-6">Get in Touch</h1>
                <form class="space-y-6">
                    <input type="text" placeholder="Full Name" class="w-full p-4 border rounded outline-none focus:ring-2 ring-brand-500">
                    <input type="email" placeholder="Email Address" class="w-full p-4 border rounded outline-none focus:ring-2 ring-brand-500">
                    <textarea placeholder="Your Message" class="w-full p-4 border rounded outline-none focus:ring-2 ring-brand-500 h-32"></textarea>
                    <button class="w-full bg-brand-600 text-white font-bold py-4 rounded hover:bg-brand-700">Send Message</button>
                </form>
            </div>
            <div class="bg-slate-900 text-white p-10 rounded-2xl">
                <h2 class="text-3xl font-bold mb-8">Emergency Resources</h2>
                <div class="space-y-6">
                    <p class="text-xl font-bold text-red-400">Police / Medical: 911</p>
                    <p class="text-xl font-bold text-brand-300">Crisis Line: 988</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-slate-900 text-slate-300 pt-16 pb-8 border-t-4 border-brand-500">
        <div class="max-w-7xl mx-auto px-4 text-center text-xs text-slate-500">
            &copy; 2026 SEMA Emotional Wellness Institution. All Rights Reserved.
        </div>
    </footer>
</body>
</html>
